name: Fetch 3D Print Stats

on:
  schedule:
    - cron: '0 14 * * *'  # 10 AM EDT (UTC-4) — shifts to 9 AM in winter
  workflow_dispatch:       # lets you trigger it manually from GitHub too

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch stats
        env:
          TV_ACCESS_TOKEN: ${{ secrets.TV_ACCESS_TOKEN }}
          MW_AUTH_TOKEN:   ${{ secrets.MW_AUTH_TOKEN }}
          MMF_API_KEY:     ${{ secrets.MMF_API_KEY }}
        run: python fetch_stats.py

      - name: Commit updated stats
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats_history.json stats_data.js
          git diff --staged --quiet || git commit -m "stats: $(date -u +%Y-%m-%d)"
          git push
